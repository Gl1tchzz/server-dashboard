<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nafiul Server</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Nafiul Server</h1>
        <p>Live project status, controls, and terminal logs.</p>
      </div>
      <button onclick="loadContainers()">Refresh</button>
    </header>
    <section id="cards" class="grid"></section>
    <section class="terminal-section">
      <div class="terminal-header">
        <h2 id="terminal-title">Live Terminal</h2>
        <button onclick="clearLogs()">Clear</button>
      </div>
      <pre id="terminal">Select a project to view live logs.</pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
