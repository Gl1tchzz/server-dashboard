services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: server-dashboard
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8088:8088"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /srv/nas:/host/nas:ro
      - /opt/docker:/opt/docker
      - ./config:/app/config:ro
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
